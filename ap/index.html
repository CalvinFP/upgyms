<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apertura Fitness Park</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="coming-soon">
        <div class="test">
            <h2>Próxima aperturas:</h2>
            <h1>Córdoba - La Sierra</h1>

            <div class="countdown">
                <div class="container-day">
                    <h3 class="day">00</h3>
                    <h3>Días</h3>
                </div>

                <div class="container-hour">
                    <h3 class="hour">00</h3>
                    <h3>Horas</h3>
                </div>

                <div class="container-minute">
                    <h3 class="minute">00</h3>
                    <h3>Minutos</h3>
                </div>

                <div class="container-second">
                    <h3 class="second">00</h3>
                    <h3>Segundos</h3>
                </div>
            </div>
        </div>
    </section>

    <section id="names">
        <div id="proximo">
            <h3 id="prox">
                <span style="color:#FFD600;">Siguientes:</span>
                <span id="name">-</span>
            </h3>
        </div>
    </section>

    <div id="totem">
        <img src="totem.png" alt="totem" width="100" height="100">
    </div>

    <script src="app.js"></script>
</body>
</html>
